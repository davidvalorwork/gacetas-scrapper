<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Consulting - Buscador de Cédulas en Gacetas</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #14171c;
            --panel-bg: #17181B;
            --text-main: #ffffff;
            --text-muted: #CFCFCF;
            --accent: #EA5536;
            --accent-hover: #d34324;
            --accent-glow: rgba(234, 85, 54, 0.2);
            --border: rgba(234, 85, 54, 0.2);
            --border-hover: rgba(234, 85, 54, 0.5);
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Nunito', 'Nunito Sans', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative blur circles from SIP Consulting */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 384px;
            height: 384px;
            border-radius: 50%;
            background: rgba(234, 85, 54, 0.2);
            filter: blur(100px);
            z-index: -1;
        }
        
        body::before {
            top: -200px;
            left: -200px;
        }

        body::after {
            bottom: -200px;
            right: -200px;
        }

        .header-logo {
            max-width: 250px;
            margin: 0 auto 1.5rem;
            display: block;
        }

        .hero-section {
            padding: 4rem 0 2rem;
            text-align: center;
        }

        .hero-title {
            font-weight: 800;
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .hero-title .accent-text {
            color: var(--accent);
        }

        .search-container {
            max-width: 650px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            background: var(--bg-color);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .results-section {
            padding: 0 2rem 4rem;
        }

        /* Solid Panel Container */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-x: auto;
            animation: slideUp 0.6s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
            transition: color 0.2s ease;
        }

        th:hover {
            color: var(--accent);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #ffffff;
            transition: background 0.2s ease;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr:hover td {
            background: rgba(255,255,255,0.03);
        }

        .cedula-badge {
            background: rgba(234, 85, 54, 0.1);
            border: 1px solid var(--accent);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
        }

        .btn-custom {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-primary-custom {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #ffffff;
        }

        .btn-primary-custom:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #ffffff;
        }

        .btn-outline-custom {
            background: rgba(234, 85, 54, 0.05);
            border: 1px solid var(--accent);
            color: #ffffff;
        }

        .btn-outline-custom:hover {
            background: var(--accent);
            color: #ffffff;
        }

        .btn-danger-outline {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger-outline:hover {
            background: var(--danger);
            color: #ffffff;
        }

        .gaceta-link {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: #ffffff;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .gaceta-link:hover {
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner-border {
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem;
            font-size: 1.1rem;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(23, 24, 27, 0.5);
        }
        
        .appearance-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.8rem;
            margin-bottom: 0.8rem;
        }
        
        .appearance-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .progress-container {
            max-width: 650px;
            margin: 1.5rem auto 0;
            background: rgba(23, 24, 27, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            display: none;
            text-align: left;
        }

        .progress {
            height: 12px;
            background-color: #0b0c0f;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        .progress-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(23, 24, 27, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        
        .pagination button {
            background: rgba(234, 85, 54, 0.1);
            border: 1px solid var(--accent);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            color: #fff;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border);
            color: var(--text-muted);
        }

        .multiple-badge {
            display: inline-block;
            background: rgba(43, 147, 72, 0.15);
            border: 1px solid #2b9348;
            color: #55c774;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .filter-select {
            background: rgba(23, 24, 27, 0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
            appearance: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .filter-select:focus, .filter-select:hover {
            border-color: var(--accent);
            background: rgba(234, 85, 54, 0.05);
        }
        
        .filter-select option {
            background: var(--panel-bg);
            color: var(--text-main);
        }

    </style>
</head>
<body>

    <main class="container">
        <!-- Hero & Search -->
        <div class="hero-section">
            <img src="/static/img/logo_header.svg" alt="SIP Consulting Logo" class="header-logo">
            <h1 class="hero-title">Sistema de <span class="accent-text">Búsqueda</span> de Gacetas</h1>
            <p class="text-muted mb-4" style="color: var(--text-muted) !important;">Encuentra e identifica cualquier cédula registrada en Gacetas Oficiales</p>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Ej. V-123456 o Maria Perez" autocomplete="off">
                <div class="mt-4 gap-3 d-flex justify-content-center flex-wrap">
                    <button id="btnMine" class="btn-custom btn-primary-custom">⬇️ Iniciar Extracción</button>
                    <button id="btnClear" class="btn-custom btn-danger-outline">🗑️ Vaciar Base de Datos</button>
                </div>

                <!-- Filters UI -->
                <div class="filters-container mt-3 d-flex justify-content-center flex-wrap gap-2">
                    <select id="filterLetter" class="filter-select">
                        <option value="">Cualquier Tipo (V, E, J...)</option>
                        <option value="V">Venezolano (V)</option>
                        <option value="E">Extranjero (E)</option>
                        <option value="J">Jurídico (J)</option>
                        <option value="G">Gubernamental (G)</option>
                        <option value="P">Pasaporte (P)</option>
                    </select>

                    <select id="filterRange" class="filter-select">
                        <option value="">Rango Completo</option>
                        <option value="0-10">Menos de 10 Millones</option>
                        <option value="10-20">10 A 20 Millones</option>
                        <option value="20-30">20 A 30 Millones</option>
                        <option value="30+">Más de 30 Millones</option>
                    </select>

                    <select id="filterSort" class="filter-select">
                        <option value="newest">Más Recientes</option>
                        <option value="apariciones">Mayor Cant. de Apariciones</option>
                    </select>
                </div>
                
                <!-- Progress Bar -->
                <div id="progressContainer" class="progress-container">
                    <div class="progress">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progressMessage" class="text-truncate" style="max-width: 85%;">Iniciando...</span>
                        <span id="progressPct">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

        <!-- Results -->
        <div class="results-section">
            <div class="glass-panel" id="resultsPanel" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 20%; cursor: pointer;" id="th-cedula">Cédula ⇅</th>
                            <th style="width: 30%; cursor: pointer;" id="th-nombre">Nombre Extraído ⇅</th>
                            <th style="width: 50%;">Apariciones Oficiales (Gacetas)</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Filled via JS -->
                    </tbody>
                </table>
                <div class="pagination" id="paginationControls">
                    <button id="btnPrevPage">Anterior</button>
                    <span id="pageInfo" style="color: var(--text-muted); font-size: 0.9rem;">Página 1 de 1 (0 resultados)</span>
                    <button id="btnNextPage">Siguiente</button>
                </div>
            </div>
            <div class="empty-state" id="emptyState">
                No hay resultados para mostrar. Ingresa una búsqueda para comenzar.
            </div>
        </div>
    </main>

    <script>
        const searchInput = document.getElementById('searchInput');
        const loader = document.getElementById('loader');
        const resultsPanel = document.getElementById('resultsPanel');
        const resultsBody = document.getElementById('resultsBody');
        const emptyState = document.getElementById('emptyState');

        let timeout = null;
        let currentData = [];
        let sortCol = '';
        let sortAsc = true;

        let currentPage = 1;
        let totalPages = 1;

        // Register event listeners to avoid inline handlers (CSP evaluation constraint)
        document.getElementById('th-cedula').addEventListener('click', () => sortTable('cedula'));
        document.getElementById('th-nombre').addEventListener('click', () => sortTable('nombre'));
        document.getElementById('btnPrevPage').addEventListener('click', () => changePage(-1));
        document.getElementById('btnNextPage').addEventListener('click', () => changePage(1));
        document.getElementById('btnMine').addEventListener('click', triggerMine);
        document.getElementById('btnClear').addEventListener('click', triggerClear);

        // Filter event listeners
        document.getElementById('filterLetter').addEventListener('change', () => { currentPage = 1; fetchResults(searchInput.value.trim()); });
        document.getElementById('filterRange').addEventListener('change', () => { currentPage = 1; fetchResults(searchInput.value.trim()); });
        document.getElementById('filterSort').addEventListener('change', () => { currentPage = 1; fetchResults(searchInput.value.trim()); });

        // On typing, trigger search with debounce
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            const query = e.target.value.trim();
            timeout = setTimeout(() => {
                currentPage = 1; // Reset to page 1 on new search
                fetchResults(query);
            }, 300); // 300ms debounce
        });

        // Initialize empty search on load to show recent entries
        fetchResults('');
        
        function changePage(delta) {
            currentPage += delta;
            fetchResults(searchInput.value.trim());
        }

        async function fetchResults(query) {
            loader.style.display = 'block';
            
            const letter = document.getElementById('filterLetter').value;
            const range = document.getElementById('filterRange').value;
            const sort = document.getElementById('filterSort').value;

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&page=${currentPage}&limit=15&letter=${encodeURIComponent(letter)}&range=${encodeURIComponent(range)}&sort=${encodeURIComponent(sort)}`);
                const result = await response.json();
                
                // If it returned the new paginated structure
                if (result.data) {
                    currentData = result.data;
                    totalPages = result.total_pages;
                    document.getElementById('pageInfo').innerText = `Página ${result.page} de ${result.total_pages || 1} (${result.total} resultados)`;
                    document.getElementById('btnPrevPage').disabled = result.page <= 1;
                    document.getElementById('btnNextPage').disabled = result.page >= result.total_pages;
                } else {
                    // Fallback for old un-paginated array
                    currentData = result;
                    document.getElementById('paginationControls').style.display = 'none';
                }
                
                loader.style.display = 'none';

                if (currentData.length === 0) {
                    resultsPanel.style.display = 'none';
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    resultsPanel.style.display = 'block';
                    applySortingAndRender();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                loader.style.display = 'none';
            }
        }

        function sortTable(column) {
            if (sortCol === column) {
                sortAsc = !sortAsc; // toggle direction if same column
            } else {
                sortCol = column;
                sortAsc = true;
            }
            
            // Update Headers UI
            document.getElementById('th-cedula').innerHTML = "Cédula " + (sortCol === 'cedula' ? (sortAsc ? "▲" : "▼") : "⇅");
            document.getElementById('th-nombre').innerHTML = "Nombre Extraído " + (sortCol === 'nombre' ? (sortAsc ? "▲" : "▼") : "⇅");

            applySortingAndRender();
        }

        function applySortingAndRender() {
            if (sortCol) {
                currentData.sort((a, b) => {
                    let valA = a[sortCol] ? a[sortCol].toString().toLowerCase() : '';
                    let valB = b[sortCol] ? b[sortCol].toString().toLowerCase() : '';
                    
                    if (valA < valB) return sortAsc ? -1 : 1;
                    if (valA > valB) return sortAsc ? 1 : -1;
                    return 0;
                });
            }
            renderTable(currentData);
        }

        function renderTable(data) {
            resultsBody.innerHTML = '';
            
            data.forEach(item => {
                const tr = document.createElement('tr');
                
                let aparicionesHtml = '';
                item.apariciones.forEach((ap, index) => {
                    // Check if it's beyond a reasonable limit visually and add a toggle or show all
                    if (index > 4) {
                        if (index === 5) {
                            aparicionesHtml += `<div class="appearance-item text-center"><span style="color:var(--text-muted); font-size: 0.8rem;">... y ${item.total_apariciones - 5} apariciones más ocultas.</span></div>`;
                        }
                        return;
                    }

                    const pageNumber = ap.pagina || 1;
                    const pdfUrl = ap.filename ? `/pdf/${encodeURIComponent(ap.filename)}#page=${pageNumber}` : '#';
                    
                    aparicionesHtml += `
                        <div class="d-flex justify-content-between align-items-center appearance-item">
                            <div style="color: var(--text-muted); font-size: 0.9rem;">
                                <strong style="color: #fff; font-size: 0.95rem;"># ${ap.numero_gaceta}</strong> <br>
                                <span style="opacity:0.8; font-size: 0.85rem;">📅 ${ap.fecha || 'Desconocida'} • Pág. ${pageNumber}</span>
                            </div>
                            <a href="${pdfUrl}" target="_blank" class="gaceta-link">
                                Ver Documento
                            </a>
                        </div>
                    `;
                });
                
                let multiplesBadge = '';
                if (item.total_apariciones > 1) {
                    multiplesBadge = `<br><span class="multiple-badge">Aparece en ${item.total_apariciones} Gacetas</span>`;
                }

                tr.innerHTML = `
                    <td style="vertical-align: top; padding-top: 1.5rem;">
                        <span class="cedula-badge">${item.cedula}</span>
                        ${multiplesBadge}
                    </td>
                    <td class="fw-bold" style="color: #ffffff; vertical-align: top; padding-top: 1.5rem;">${item.nombre}</td>
                    <td style="vertical-align: top; padding-right: 1rem; padding-top: 1.2rem;">
                        ${aparicionesHtml}
                    </td>
                `;

                resultsBody.appendChild(tr);
            });
        }

        async function triggerMine() {
            if (!confirm("¿Seguro que deseas iniciar la extracción de cédulas? Esto analizará las gacetas en la carpeta de descargas.")) return;
            
            try {
                const res = await fetch('/api/mine', { method: 'POST' });
                const json = await res.json();
                if (!progressInterval) {
                   progressInterval = setInterval(checkProgress, 2000);
                }
                checkProgress();
            } catch(e) {
                alert("Error al iniciar extracción");
            }
        }

        async function triggerClear() {
            if (!confirm("⚠️ ADVERTENCIA: ¿Estás completamente seguro de que deseas ELIMINAR TODAS las cédulas de la base de datos? Esta acción no se puede deshacer.")) return;
            
            try {
                const res = await fetch('/api/clear', { method: 'POST' });
                const json = await res.json();
                alert(json.message);
                if (json.status === "success") {
                    fetchResults(searchInput.value);
                }
            } catch(e) {
                alert("Error al vaciar la base de datos");
            }
        }

        let progressInterval = null;
        let lastProgressPct = -1;

        async function checkProgress() {
            try {
                const res = await fetch('/api/progress');
                const data = await res.json();
                
                if (data.status === 'processing') {
                    document.getElementById('progressContainer').style.display = 'block';
                    document.getElementById('progressBar').style.width = data.percentage + '%';
                    document.getElementById('progressPct').innerText = data.percentage + '%';
                    document.getElementById('progressMessage').innerText = data.message;
                    
                    document.getElementById('btnMine').disabled = true;
                    document.getElementById('btnMine').style.opacity = '0.5';
                    document.getElementById('btnMine').innerText = "Procesando...";

                    // Optionally trigger refresh if progress bumps noticeably (e.g. every 10%)
                    if (data.percentage > lastProgressPct + 10) {
                        lastProgressPct = data.percentage;
                        fetchResults(searchInput.value); 
                    }
                    
                } else {
                    // done or idle
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('btnMine').disabled = false;
                    document.getElementById('btnMine').style.opacity = '1';
                    document.getElementById('btnMine').innerText = "⬇️ Iniciar Extracción";
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                        lastProgressPct = -1;
                        fetchResults(searchInput.value); 
                    }
                }
            } catch(e) {
                console.error("Error checking progress", e);
            }
        }
        
        // Kick off check on load
        checkProgress();
        progressInterval = setInterval(checkProgress, 2000);

    </script>
</body>
</html>
